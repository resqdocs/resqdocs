apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'   // #170: natives ZXing-C++-Decoder-Plugin (Kotlin)

// Release-Signierung: liest die Keystore-Daten aus einer NICHT eingecheckten
// key.properties (rootProject = android/, also apps/pico-pwa/android/key.properties).
// Fehlt die Datei (CI/Container ohne Keystore), bleibt der Release-Build unsigniert
// statt hart zu scheitern - echte Werte/Keystore liegen ausschliesslich extern.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "app.resqdocs"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.example.resqdocs"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 13
        versionName "1.3.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Werte NUR setzen, wenn die externe key.properties vorhanden ist; sonst
            // bleibt der Config leer und wird unten bewusst NICHT referenziert.
            if (hasKeystore) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // Guard: nur signieren, wenn key.properties geladen wurde. Ein Build ohne
            // Keystore (CI/Container) referenziert den Signing-Config nicht und
            // scheitert daher nicht.
            if (hasKeystore) {
                signingConfig signingConfigs.release
            }
            // #208: native Debug-Symbole (libzxingcpp_android.so, libsqlcipher.so, Bildverarbeitung)
            // ins AAB aufnehmen, damit die Play Console native Crashes/ANRs symbolisiert. Die Symbole
            // liegen in einer SEPARATEN Metadaten-Datei (NICHT an Geraete ausgeliefert, kein
            // Installations-Groessenzuwachs); Play-Limit 300 MB -> bei Ueberschreitung auf
            // debugSymbolLevel = "SYMBOL_TABLE" zuruecksetzen. Greift nur bei bundleRelease (AAB).
            ndk {
                debugSymbolLevel = "FULL"
            }
        }
    }
}

// Cordova-Framework 14 (org.apache.cordova:framework, transitiv ueber das generierte Modul
// capacitor-cordova-android-plugins eingebunden) zieht androidx.core:core-splashscreen mit.
// Die Library wird hier NICHT genutzt (kein installSplashScreen()-Aufruf; Cordovas
// SplashScreenPlugin ruft die Setter nicht selbst), liefert aber deprecated Edge-to-Edge-APIs
// (setStatusBarColor/setNavigationBarColor/setDecorFitsSystemWindows aus ThemeUtils$Api31) als
// toten Bytecode in die AAB -> Play-Console-Warnung "randlose Anzeige". App-weit ausschliessen.
// Gehoert bewusst in app/build.gradle (committet, von `cap sync` NICHT regeneriert), nicht ins
// generierte capacitor-cordova-android-plugins/build.gradle.
configurations.all {
    exclude group: 'androidx.core', module: 'core-splashscreen'
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'io.github.zxing-cpp:android:3.0.2'   // #170 (Apache-2.0, GMS-frei, Data-Matrix-Decoder)
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// GAP 4: Bundle-Frische-/Versions-Guard vor JEDEM Release-Build. Verhindert, dass ein AAB/APK mit
// veraltetem oder versions-abweichendem Web-Bundle entsteht (Vorfall 1.2.1). Haengt am echten Store-Build-
// Graphen (bundleRelease/assembleRelease), nicht an den Entwickler-Komfortskripten open-*.sh -> greift egal
// wie der Release gestartet wird (gradlew CLI oder Android Studio). Benoetigt `node` auf dem PATH des Builds.
tasks.register('checkBundleFresh', Exec) {
    workingDir file("${rootProject.projectDir}/..")   // apps/pico-pwa
    commandLine 'node', 'scripts/check-bundle-fresh.mjs', 'android', 'android/app/src/main/assets/public'
}
tasks.matching { it.name in ['bundleRelease', 'assembleRelease'] }.configureEach {
    dependsOn 'checkBundleFresh'
}
