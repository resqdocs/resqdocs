# Wiederkehrende OSS-Lizenz-Compliance (vorbereitet — NICHT als Pflicht-Check aktiv).
#
# Zwei Säulen:
#   A) github/licensed → npm-/App-Abhängigkeiten gegen die Allowlist (.licensed.yml)
#   B) REUSE (fsfe)    → Firmware-Quellen + CYW43-Blob + Binär-Artefakte (REUSE.toml, LICENSES/)
# Plus SPDX-/CycloneDX-SBOM als Audit-Artefakt (Zeitreihe gegen Lizenz-Drift).
#
# Portabel für GitHub Actions: alle Tools werden direkt per
# pip/gem installiert (KEINE Abhängigkeit von Marketplace-Actions außer checkout/
# setup/upload). Andere CI-Systeme nutzen .github/workflows als Fallback, wenn kein
# ein CI-spezifisches Verzeichnis existiert (hier bewusst nur eine Datei → kein Drift).
#
# WICHTIG: Der Workflow PRÜFT nur. Er pusht/mergt NICHT, schreibt KEINEN Cache nach
# dev und löst KEIN Release/Tag/Sync aus. Aktivierung als Branch-Protection-
# Pflicht-Check erfolgt SEPARAT durch den Nutzer (nicht im Code).

name: license-compliance

on:
  pull_request:
    paths:
      - 'package.json'
      - '**/package.json'
      - '**/package-lock.json'
      - 'apps/**'
      - 'firmware/**'
      - 'LICENSES/**'
      - 'REUSE.toml'
      - '.licensed.yml'
      - '.github/workflows/license-compliance.yml'
  schedule:
    # Wöchentlich montags 06:00 UTC — fängt Drift OHNE Code-Änderung
    # (re-lizenzierte Deps, SPDX-Deprecations, geänderte Blob-Bedingungen).
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # --- Säule B (1/2): Firmware + CYW43-Blob — BLOCKIEREND ---
  # Jede Änderung an einer Firmware-/Blob-Lizenz (z. B. fehlender LicenseRef-CYW43-RP-
  # Text, gebrochene SPDX-Annotation einer .bin/.uf2) lässt diesen Job HART fehlschlagen.
  reuse-lint-firmware:
    name: REUSE firmware+blob (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install reuse
        run: |
          python3 -m pip install --user "reuse[charset-normalizer]"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: REUSE lint (Firmware-Subtree + Binär-Artefakte, scoped)
        # Pfade entsprechen dem REUSE.toml-Geltungsbereich (Firmware-Quellen mit
        # SPDX-Headern aus #178 + die annotierten Binär-/Metadaten-Artefakte).
        run: |
          reuse lint-file \
            firmware/bridge/bridge_s2/bridge_s2.ino \
            firmware/bridge/bridge_s2/ConfigStore.h \
            firmware/bridge/bridge_s2/JsonMini.h \
            firmware/bridge/bridge_s2/OtaUpdate.h \
            firmware/bridge/bridge_s2/OtaPublicKey.h \
            firmware/bridge/libraries/Typer/src/Typer.cpp \
            firmware/bridge/libraries/Typer/src/Typer.h \
            firmware/bridge/libraries/Typer/src/OsMode.h \
            firmware/bridge/libraries/Typer/src/TestString.h \
            firmware/bridge/libraries/Typer/library.properties \
            firmware/bridge/slice_a_umlaut/slice_a_umlaut.ino \
            firmware/bridge/slice_a_umlaut/sketch.yaml \
            firmware/bridge/slice_b_bridge/slice_b_bridge.ino \
            firmware/bridge/slice_b_bridge/WebForm.h \
            firmware/bridge/slice_b_bridge/sketch.yaml \
            firmware/test/umlaut-test/code.py \
            firmware/bridge/dist/bridge_s2.pico2w.uf2 \
            firmware/bridge/dist/slice_a_umlaut.pico2w.uf2 \
            firmware/bridge/dist/slice_b_bridge.pico2w.uf2 \
            apps/pico-pwa/src/assets/firmware/bridge_s2.bin \
            apps/pico-pwa/src/assets/firmware/bridge_s2.manifest.json

  # --- Säule B (2/2): repo-weit — NICHT blockierend (Sichtbarkeit) ---
  # Repo-weite REUSE-Adoption (App/Doku/intern) ist noch offen → vorerst nur Signal.
  # AKTIVIERUNG: continue-on-error entfernen, sobald die Abdeckung vollständig ist.
  reuse-lint-full:
    name: REUSE full repo (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install reuse
        run: |
          python3 -m pip install --user "reuse[charset-normalizer]"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: REUSE lint (whole repo)
        run: reuse lint

  # --- Säule A: npm-/App-Abhängigkeiten gegen Allowlist ---
  # Direkte Gem-Schritte (KEINE licensed-ci-Action) → identisch ueber CI-Systeme hinweg,
  # keine GitHub-API-Abhängigkeit, KEIN PR/Comment/Auto-Push. Nur Prüfen.
  # Hinweis: erst nach grünem Erstlauf vom Nutzer als Pflicht-Check setzen.
  licensed-status:
    name: licensed npm allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install app dependencies (Metadaten-Enumeration)
        run: |
          npm --prefix apps/pico-pwa ci || npm --prefix apps/pico-pwa install
          npm --prefix apps/landing-page ci || npm --prefix apps/landing-page install
      - name: Install licensed
        run: gem install licensed
      - name: licensed cache (ephemer, KEIN Push nach dev)
        run: licensed cache
      - name: licensed status (Allowlist-Verifikation)
        run: licensed status

  # --- Audit-Artefakt: SBOM (nicht blockierend) ---
  sbom:
    name: SBOM (audit artifact)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install reuse
        run: |
          python3 -m pip install --user "reuse[charset-normalizer]"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: SPDX SBOM (REUSE)
        run: reuse spdx -o reuse.spdx
      - name: CycloneDX SBOM (npm, pico-pwa)
        run: |
          npm --prefix apps/pico-pwa ci || npm --prefix apps/pico-pwa install
          npx --yes @cyclonedx/cyclonedx-npm --omit dev \
            --output-file pico-pwa.cdx.json apps/pico-pwa/package.json || true
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            reuse.spdx
            pico-pwa.cdx.json
          if-no-files-found: warn
